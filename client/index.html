<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Death Note</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>☠ Death Note ☠</h1>

<div id="authBox">

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="adminKey"
placeholder="Admin Key (Optional)">

<button onclick="register()">
Register
</button>

<button onclick="login()">
Login
</button>

</div>

<div id="bannedBox"
class="hidden">

<h1>
🚫 YOU ARE BANNED
</h1>

</div>

<div id="app"
class="hidden">

<div id="life"></div>

<div id="eyesBadge"></div>

<button onclick="logout()">
Logout
</button>

<div id="userPanel">

<textarea
id="victim"
placeholder="Victim Name">
</textarea>

<textarea
id="reason"
placeholder="Death Reason">
</textarea>

<textarea
id="details"
placeholder="Death Details">
</textarea>

<button onclick="writeNote()">
WRITE
</button>

<button onclick="activateEyes()">
TAKE EYES
</button>

<button onclick="giveUpNotebook()">
GIVE UP
</button>

<button onclick="reclaimNotebook()">
RECLAIM
</button>

<div id="notes"></div>

</div>

<div id="adminPanel"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
